name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Client ─────────────────────────────────────────────────────
  client-lint:
    name: "Client: Lint + Types"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm exec tsc --noEmit

  client-build:
    name: "Client: Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Next.js build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
          NEXT_PUBLIC_BOT_START_URL: "http://localhost:7860/start"

  # ── Server ─────────────────────────────────────────────────────
  server-lint:
    name: "Server: Lint + Format + Types"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      - name: ty check
        run: uv run ty check

  server-test:
    name: "Server: Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: Pytest
        run: uv run pytest -x -q
