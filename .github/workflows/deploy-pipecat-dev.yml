name: Deploy Pipecat Dev Bot

on:
  push:
    branches:
      - main
    paths:
      - "server/bot/**"
      - "server/shared/**"
      - "server/bot/Dockerfile"
      - "server/pyproject.toml"
      - "server/uv.lock"
      - "server/pcc-deploy.toml"
      - ".github/workflows/deploy-pipecat-dev.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pipecat-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Dev Agent (cloud build)
    runs-on: ubuntu-latest
    environment: readme / dev
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Deploy to Pipecat Cloud
        uses: daily-co/pipecat-cloud-deploy-action@v2
        with:
          api-key: ${{ secrets.PCC_API_KEY }}
          agent-name: readme-bot-dev
          cloud-build: true
          secret-set: readme-dev
          build-context: server
          dockerfile: bot/Dockerfile

      - name: Smoke test start endpoint
        env:
          PIPECAT_DEFAULT_PUBLIC_KEY: ${{ secrets.PIPECAT_DEFAULT_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "https://api.pipecat.daily.co/v1/public/readme-bot-dev/start" \
            -H "Authorization: Bearer ${PIPECAT_DEFAULT_PUBLIC_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"createDailyRoom": true}' \
            > /dev/null
