[supabase]
url = "${SUPABASE_URL}"
secret_key = "${SUPABASE_SECRET_KEY}"
books_bucket = "readme_dev"

[daily]
api_key = "${DAILY_API_KEY}"
api_base_url = "https://api.daily.co/v1"
room_ttl_seconds = 1800

[keys]
google_api_key = "${GOOGLE_API_KEY}"
openai_api_key = "${OPENAI_API_KEY}"
deepgram_api_key = "${DEEPGRAM_API_KEY}"
cartesia_api_key = "${CARTESIA_API_KEY}"

[bot]
start_url = "http://bot:7860/start"

[modal]
app_name = "${MODAL_APP_NAME}"

[pipecat_cloud]
public_key = "${PIPECAT_PUBLIC_KEY}"
agent_name = "readme-bot-dev"

[upload]
max_bytes = 26214400

[cors]
allowed_origins = "${CORS_ALLOWED_ORIGINS}"
allowed_origin_regex = 'https://.*\.vusercontent\.net'
